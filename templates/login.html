<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZCAS Student Tracker Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Reset */
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

/* Gradient Animated Background */
body {
    height:100vh;
    background: linear-gradient(-45deg, #002D72, #0055A4, #FFD100, #002D72);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* App Bar */
.app-bar {
    width:100%;
    max-width: 400px;
    background:#002D72;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:15px;
    border-radius:12px 12px 0 0;
    color:#FFD100;
    font-size:1.2rem;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    margin-bottom:20px;
    position: relative;
    z-index:2;
}

.app-bar img {
    height:40px;
    margin-right:10px;
    animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
    0% { transform: translateY(0);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0);}
}

/* Login Card */
.login-card {
    background:white;
    padding:40px 30px;
    width:360px;
    border-radius:12px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
    position: relative;
    z-index:2;
    transform: translateY(50px);
    opacity:0;
    animation: slideFade 1s forwards;
    overflow:hidden;
}

.login-card:hover{
    transform: translateY(-5px);
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.login-card::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle, rgba(255, 209, 0,0.2), transparent 70%);
    top: -25%;
    left: -25%;
    z-index:1;
    animation: pulseGlow 3s infinite alternate;
    border-radius:50%;
}

@keyframes pulseGlow {
    0% { transform: scale(1); opacity:0.6; }
    100% { transform: scale(1.2); opacity:0.2; }
}

@keyframes slideFade {
    to {transform: translateY(0); opacity:1;}
}

.login-card h2{
    margin-bottom:25px;
    color:#002D72;
    font-weight:700;
}

/* Input Fields */
.input-group{
    position: relative;
    margin-bottom:15px;
}

input {
    width:100%;
    padding:12px 15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

input:focus {
    outline:none;
    border-color:#002D72;
    box-shadow:0 0 8px rgba(0,45,114,0.5);
}

.password-field .eye {
    position: absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:16px;
    user-select:none;
    color:#888;
    transition: color 0.3s;
}

.password-field .eye:hover {
    color:#002D72;
}

/* Password strength bar */
.strength {
    height:6px;
    border-radius:4px;
    background:#eee;
    overflow:hidden;
    margin-top:-10px;
    margin-bottom:15px;
}

.strength div {
    height:100%;
    width:0%;
    background:#002D72;
    transition:0.3s;
}

/* Button */
button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#002D72;
    color:#FFD100;
    font-size:16px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover {
    background: linear-gradient(90deg, #FFD100, #FFB700);
    color:#002D72;
    transform: translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* Links */
a {
    display:block;
    margin-top:12px;
    font-size:14px;
    color:#002D72;
    text-decoration:none;
}

a:hover {
    text-decoration:underline;
}

/* Floating Circles */
.circle{
    position:absolute;
    border-radius:50%;
    opacity:0.25;
    animation: float 20s linear infinite;
    z-index:1;
}

.circle1{ width:160px; height:160px; background:#FFD100; top:10%; left:5%; animation-duration:20s;}
.circle2{ width:110px; height:110px; background:#002D72; top:50%; left:80%; animation-duration:25s;}
.circle3{ width:130px; height:130px; background:#0055A4; top:70%; left:20%; animation-duration:30s;}
.circle4{ width:90px; height:90px; background:#FFD100; top:30%; left:50%; animation-duration:18s;}

@keyframes float{
    0%{ transform: translate(0,0) scale(1) rotate(0deg);}
    25%{ transform: translate(20px,-20px) scale(1.1) rotate(90deg);}
    50%{ transform: translate(0,-50px) scale(1) rotate(180deg);}
    75%{ transform: translate(-20px,-20px) scale(0.9) rotate(270deg);}
    100%{ transform: translate(0,0) scale(1) rotate(360deg);}
}

/* Floating Emojis */
.floating-emoji {
    position:absolute;
    font-size:24px;
    top:100%;
    opacity:0.8;
    animation: floatEmoji 8s linear infinite;
}

@keyframes floatEmoji {
    0% { transform: translateY(0) rotate(0deg); opacity:0; }
    10% { opacity:1; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity:0; }
}

@media(max-width:400px){
    .login-card{ width:90%; padding:30px;}
    .app-bar { font-size:1rem; }
}
</style>
</head>
<body>

<!-- App Bar -->
<div class="app-bar">
    <img src="{{ url_for('static', filename='zcas_logo.png') }}" alt="ZCAS Logo">
    🎓 ZCAS Student Grades Tracker
</div>

<!-- Login Card -->
<div class="login-card">
    <h2>Start Tracking Your Grades!</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group password-field">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <div class="strength">
            <div id="strength-bar"></div>
        </div>

        <button type="submit">Login</button>
    </form>

    <a href="{{ url_for('forgot_password') }}">Forgot your password?</a>
</div>

<!-- Floating Circles -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>
<div class="circle circle4"></div>

<!-- Floating Emojis -->
<div class="floating-emoji" style="left:20%;">🎓</div>
<div class="floating-emoji" style="left:60%;">📚</div>
<div class="floating-emoji" style="left:80%;">📝</div>

<script>
    // Toggle password visibility
    function togglePassword(){
        const pw = document.getElementById('password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    // Password strength meter
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strength-bar');

    passwordInput.addEventListener('input', ()=>{
        const val = passwordInput.value;
        let strength = 0;
        if(val.length >= 6) strength += 33;
        if(/[A-Z]/.test(val)) strength += 33;
        if(/[0-9]/.test(val)) strength += 34;
        strengthBar.style.width = strength + '%';
        if(strength<50) strengthBar.style.background='#FF4D4D';
        else if(strength<75) strengthBar.style.background='#FFD100';
        else strengthBar.style.background='#00C853';
    });
</script>

</body>
</html>
