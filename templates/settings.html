<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - Student Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { display: flex; min-height: 100vh; background-color: #f5f7fa; color: #333; }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background-color: #004aad;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .sidebar h2 { font-size: 1.5rem; margin-bottom: 20px; color: #00cec9; text-align: center; }
    .sidebar a { color: #dfe6e9; text-decoration: none; padding: 10px; border-radius: 6px; transition: 0.2s; }
    .sidebar a:hover, .sidebar a.active { background-color: #00cec9; color: white; }

    /* Main content */
    .main-content { flex: 1; padding: 20px; }

    /* App bar */
    .app-bar { display: flex; justify-content: space-between; align-items: center; background-color: #004aad; color: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
    .app-bar-left { display: flex; align-items: center; gap: 15px; }
    .app-bar-left img { height: 50px; }
    .app-bar-left h1 { font-size: 1.5rem; color: #fff; }
    .app-bar-right { position: relative; display: inline-block; }
    .app-bar-right .dropdown-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1rem; padding: 5px 10px; }
    .app-bar-right .dropdown-btn:hover { color: #ffeb3b; }
    .app-bar-right .dropdown-content { display: none; position: absolute; top: 100%; right: 0; background-color: #004aad; min-width: 180px; border-radius: 6px; flex-direction: column; overflow: hidden; z-index: 1000; }
    .app-bar-right .dropdown-content button, .app-bar-right .dropdown-content a { padding: 10px 15px; color: white; background: none; border: none; text-align: left; width: 100%; cursor: pointer; text-decoration: none; }
    .app-bar-right .dropdown-content button:hover, .app-bar-right .dropdown-content a:hover { background-color: #003380; }
    .app-bar-right:hover .dropdown-content { display: flex; }

    /* Settings Sections */
    .settings-section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .settings-section h2 { margin-bottom: 15px; color: #004aad; }

    /* Form Rows */
    .form-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 15px;
    }
    .form-row label { flex: 1 0 150px; font-weight: 500; }
    .form-row input, .form-row select { flex: 2 1 300px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }

    /* Buttons */
    .settings-section button { padding: 10px 20px; background-color: #004aad; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    .settings-section button:hover { background-color: #00cec9; }

    /* Toggle */
    .toggle { position: relative; display: inline-block; width: 50px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
    .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #004aad; }
    input:checked + .slider:before { transform: translateX(24px); }
</style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="{{ url_for('home') }}" class="{% if page == 'home' %}active{% endif %}">Home</a>
        <a href="{{ url_for('students_page') }}" class="{% if page == 'students' %}active{% endif %}">Add Student</a>
        <a href="{{ url_for('student_reports_page') }}" class="{% if page == 'reports' %}active{% endif %}">Reports</a>
        <a href="{{ url_for('settings_page') }}" class="{% if page == 'settings' %}active{% endif %}">Settings</a>
    </div>

    <!-- Main content -->
    <div class="main-content">

        <!-- App Bar -->
        <div class="app-bar">
            <div class="app-bar-left">
                <img src="{{ url_for('static', filename='zcas_logo.png') }}" alt="ZCAS Logo">
                <h1>⚙️ Settings</h1>
            </div>
            <div class="app-bar-right">
                <button class="dropdown-btn">{{ current_user.first_name }} ▼</button>
                <div class="dropdown-content">
                    <button type="button">View Profile</button>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>

        <!-- User Account Settings -->
        <div class="settings-section">
            <h2>User Account</h2>
            <form method="POST" action="{{ url_for('update_profile') }}">
                <div class="form-row">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" value="{{ current_user.first_name }}">
                </div>
                <div class="form-row">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" value="{{ current_user.last_name }}">
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ current_user.email }}">
                </div>
                <div class="form-row">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter new password">
                </div>
                <button type="submit">Update Profile</button>
            </form>
        </div>

        <!-- Report Settings -->
        <div class="settings-section">
            <h2>Report Settings</h2>
            <form method="POST" action="{{ url_for('update_report_settings') }}">
                <div class="form-row">
                    <label for="grading_scale">Grading Scale</label>
                    <select id="grading_scale" name="grading_scale">
                        <option value="100" {% if current_user.grading_scale == 100 %}selected{% endif %}>0-100</option>
                        <option value="10" {% if current_user.grading_scale == 10 %}selected{% endif %}>0-10</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="passing_mark">Passing Mark</label>
                    <input type="text" id="passing_mark" name="passing_mark" value="{{ current_user.passing_mark }}">
                </div>
                <div class="form-row">
                    <label for="dark_mode">Dark Mode</label>
                    <label class="toggle">
                        <input type="checkbox" id="dark_mode" name="dark_mode" {% if current_user.dark_mode %}checked{% endif %}>
                        <span class="slider"></span>
                    </label>
                </div>
                <button type="submit">Update Report Settings</button>
            </form>
        </div>

        <!-- Admin Controls -->
        {% if current_user.is_admin %}
        <div class="settings-section">
            <h2>Admin Controls</h2>
            <form method="POST" action="{{ url_for('update_admin_settings') }}">
                <div class="form-row">
                    <label for="allow_user_registration">Allow New User Registration</label>
                    <label class="toggle">
                        <input type="checkbox" id="allow_user_registration" name="allow_user_registration" {% if current_user.allow_user_registration %}checked{% endif %}>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="form-row">
                    <label for="default_sort">Default Report Sort</label>
                    <select id="default_sort" name="default_sort">
                        <option value="name" {% if current_user.default_sort == 'name' %}selected{% endif %}>By Name</option>
                        <option value="average" {% if current_user.default_sort == 'average' %}selected{% endif %}>By Average Score</option>
                    </select>
                </div>
                <button type="submit">Update Admin Settings</button>
            </form>
        </div>
        {% endif %}

    </div>
</body>
</html>
