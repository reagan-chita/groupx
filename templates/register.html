<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZCAS Student Tracker Register</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}

        /* Animated gradient background */
        body{
            height:100vh;
            background: linear-gradient(-45deg, #002D72, #0055A4, #FFD100, #002D72);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        @keyframes gradientBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* App bar */
        .app-bar{
            height:70px;
            background:#002D72;
            display:flex;
            align-items:center;
            padding-left:20px;
            font-size:22px;
            font-weight:bold;
            color:#FFD100;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            position: relative;
            z-index:2;
        }

        /* Optional Logo */
        .app-bar img{ height:40px; margin-right:15px; }

        /* Container */
        .container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            position: relative;
            z-index:2;
        }

        /* Register Card */
        .register-card{
            background:white;
            padding:40px;
            width:350px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
            position: relative;
            z-index:2;
            transform: translateY(50px);
            opacity:0;
            animation: slideFade 1s forwards;
            transition:0.3s;
        }

        .register-card:hover{
            transform: translateY(-5px);
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        @keyframes slideFade{
            to { transform:translateY(0); opacity:1; }
        }

        .register-card h2{ margin-bottom:20px; color:#002D72; }

        /* Inputs */
        .input-group{ position:relative; }
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:14px;
            transition:0.3s;
        }
        input:focus{ outline:none; border-color:#002D72; box-shadow:0 0 5px rgba(0,45,114,0.5); }

        /* Password toggle */
        .password-field{ position:relative; }
        .password-field .eye{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:16px;
            user-select:none;
        }

        /* Button */
        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#002D72;
            color:#FFD100;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }
        button:hover{
            background: linear-gradient(90deg, #FFD100, #FFB700);
            color:#002D72;
        }

        /* Links */
        a{
            display:block;
            margin-top:15px;
            text-decoration:none;
            color:#002D72;
            font-size:14px;
        }
        a:hover{ text-decoration:underline; }

        /* Floating Circles */
        .circle{ position:absolute; border-radius:50%; opacity:0.3; animation: float 20s linear infinite; z-index:1; }
        .circle1{ width:150px; height:150px; background:#FFD100; top:10%; left:5%; animation-duration:20s; }
        .circle2{ width:100px; height:100px; background:#002D72; top:50%; left:80%; animation-duration:25s; }
        .circle3{ width:120px; height:120px; background:#0055A4; top:70%; left:20%; animation-duration:30s; }
        .circle4{ width:80px; height:80px; background:#FFD100; top:30%; left:50%; animation-duration:18s; }

        @keyframes float{
            0%{ transform: translateY(0) rotate(0deg);}
            50%{ transform: translateY(-50px) rotate(180deg);}
            100%{ transform: translateY(0) rotate(360deg);}
        }

        /* Responsive */
        @media(max-width:400px){
            .register-card{ width:90%; padding:30px; }
        }

    </style>
</head>
<body>

    <div class="app-bar">
        <!-- <img src="/static/zcas_logo.png" alt="ZCAS Logo"> -->
        🎓 ZCAS Student Grades Tracker
    </div>

    <div class="container">
        <form class="register-card" method="POST">

    <h2>Create Your Account</h2>

    <div class="input-group">
        <input type="text" name="first_name" placeholder="First Name" required>
    </div>

    <div class="input-group">
        <input type="text" name="last_name" placeholder="Last Name" required>
    </div>

    <div class="input-group">
        <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="input-group">
        <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-group password-field">
        <input type="password" id="password" name="password" placeholder="Password" required>
        <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button type="submit">Register</button>

    <a href="/login">Already have an account? Login</a>

        </form>

    </div>

    <!-- Floating Circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

    <script>
        // Password toggle
        function togglePassword(){
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        }
    </script>

</body>
</html>
