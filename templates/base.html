<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Dashboard{% endblock %}</title>

<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- SIDEBAR (Reusable) -->
{% include "_sidebar.html" %}

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- APP BAR -->
    <div class="app-bar">
        <div class="app-bar-left">
            <img src="{{ url_for('static', filename='zcas_logo.png') }}" alt="ZCAS Logo">
            <h1>🎓 Student Grades Tracker</h1>
        </div>

        <!-- Dark Mode & User Dropdown -->
        <div class="app-bar-right">
            <button onclick="toggleTheme()" class="theme-btn">🌙 Dark Mode</button>
            <button class="dropdown-btn">{{ current_user.first_name }} ▼</button>
            <div class="dropdown-content">
                <button type="button" id="openProfileModal">View Profile</button>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeProfileModal">&times;</span>
        <h2>Profile</h2>
        <p><strong>First Name:</strong> {{ current_user.first_name }}</p>
        <p><strong>Last Name:</strong> {{ current_user.last_name }}</p>
        <p><strong>Username:</strong> {{ current_user.username }}</p>
        <p><strong>Email:</strong> {{ current_user.email }}</p>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

{% block scripts %}{% endblock %}

</body>
</html>
