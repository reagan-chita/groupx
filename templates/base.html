<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Grades Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { display: flex; min-height: 100vh; background-color: #f5f7fa; }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background-color: #004aad;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .sidebar h2 { font-size: 1.5rem; margin-bottom: 20px; }
    .sidebar a { color: white; text-decoration: none; padding: 10px; border-radius: 6px; transition: 0.2s; }
    .sidebar a:hover { background-color: #003380; }

    /* Main content */
    .main-content { flex: 1; padding: 20px; }

    /* App bar */
    .app-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #004aad;
        color: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        margin-bottom: 30px;
    }
    .app-bar-left { display: flex; align-items: center; gap: 15px; }
    .app-bar-left img { height: 50px; }
    .app-bar-left h1 { font-size: 1.8rem; }

    /* App bar right dropdown */
    .app-bar-right { position: relative; display: inline-block; }
    .app-bar-right .dropdown-btn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        padding: 5px 10px;
    }
    .app-bar-right .dropdown-btn:hover { color: #ffeb3b; }
    .app-bar-right .dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background-color: #004aad;
        min-width: 180px;
        border-radius: 6px;
        flex-direction: column;
        overflow: hidden;
        z-index: 1000;
    }
    .app-bar-right .dropdown-content a,
    .app-bar-right .dropdown-content button {
        padding: 10px 15px;
        text-decoration: none;
        color: white;
        background: none;
        border: none;
        text-align: left;
        width: 100%;
        cursor: pointer;
    }
    .app-bar-right .dropdown-content a:hover,
    .app-bar-right .dropdown-content button:hover { background-color: #003380; }
    .app-bar-right:hover .dropdown-content { display: flex; }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .modal-content {
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        width: 500px;
        max-width: 90%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        position: relative;
    }
    .close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }
    .close:hover { color: #004aad; }

    /* Forms and lists */
    form input, form button {
        padding: 8px 12px;
        margin: 5px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    form button {
        background-color: #004aad;
        color: white;
        border: none;
        cursor: pointer;
    }
    form button:hover { background-color: #003380; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Dashboard</h2>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('students_page') }}">Add Student</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
</div>

<!-- Main Content -->
<div class="main-content">

    <!-- App Bar -->
    <div class="app-bar">
        <div class="app-bar-left">
            <img src="{{ url_for('static', filename='zcas_logo.png') }}" alt="ZCAS Logo">
            <h1>🎓 Student Grades Tracker</h1>
        </div>

        <div class="app-bar-right">
            <button class="dropdown-btn">{{ current_user.first_name }} ▼</button>
            <div class="dropdown-content">
                <button type="button" id="openProfileModal">View Profile</button>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>

    <!-- Content Block -->
    {% block content %}{% endblock %}

</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeProfileModal">&times;</span>
        <h2>Profile</h2>
        <p><strong>First Name:</strong> {{ current_user.first_name }}</p>
        <p><strong>Last Name:</strong> {{ current_user.last_name }}</p>
        <p><strong>Username:</strong> {{ current_user.username }}</p>
        <p><strong>Email:</strong> {{ current_user.email }}</p>
    </div>
</div>

<script>
    const profileModal = document.getElementById("profileModal");
    const openProfileBtn = document.getElementById("openProfileModal");
    const closeProfileBtn = document.getElementById("closeProfileModal");

    openProfileBtn.onclick = () => profileModal.style.display = "flex";
    closeProfileBtn.onclick = () => profileModal.style.display = "none";
    window.onclick = (event) => {
        if (event.target == profileModal) profileModal.style.display = "none";
    };
</script>

</body>
</html>
