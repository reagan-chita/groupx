<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

    /* Gradient animated background */
    body {
        height: 100vh;
        background: linear-gradient(-45deg, #002D72, #0055A4, #FFD100, #002D72);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        display:flex;
        justify-content:center;
        align-items:center;
        position: relative;
        overflow:hidden;
    }
    @keyframes gradientBG {
        0% {background-position:0% 50%;}
        50% {background-position:100% 50%;}
        100% {background-position:0% 50%;}
    }

    /* Reset card */
    .reset-card {
        background: #fff;
        padding: 40px;
        width: 360px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        position: relative;
        z-index:2;
        transform: translateY(50px);
        opacity:0;
        animation: slideFade 1s forwards;
    }
    @keyframes slideFade {
        to { transform: translateY(0); opacity:1; }
    }

    .reset-card h2 {
        margin-bottom: 25px;
        color: #002D72;
    }

    input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }
    input:focus {
        outline: none;
        border-color: #002D72;
        box-shadow: 0 0 5px rgba(0,45,114,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #002D72;
        color: #FFD100;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }
    button:hover {
        background: linear-gradient(90deg, #FFD100, #FFB700);
        color: #002D72;
    }

    p a {
        display: inline-block;
        margin-top: 15px;
        color: #002D72;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }
    p a:hover {
        text-decoration: underline;
    }

    /* Floating circles */
    .circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.3;
        animation: float 20s linear infinite;
        z-index:1;
    }
    .circle1{ width:150px; height:150px; background:#FFD100; top:10%; left:5%; animation-duration:20s;}
    .circle2{ width:100px; height:100px; background:#002D72; top:50%; left:80%; animation-duration:25s;}
    .circle3{ width:120px; height:120px; background:#0055A4; top:70%; left:20%; animation-duration:30s;}
    .circle4{ width:80px; height:80px; background:#FFD100; top:30%; left:50%; animation-duration:18s;}

    @keyframes float{
        0%{ transform: translateY(0) rotate(0deg);}
        50%{ transform: translateY(-50px) rotate(180deg);}
        100%{ transform: translateY(0) rotate(360deg);}
    }

    /* Responsive */
    @media(max-width:400px){
        .reset-card{ width:90%; padding:30px; }
    }

</style>
</head>
<body>

        <div class="container">
        <h2>Reset Password</h2>
        <form method="POST">
            <input type="password" name="new_password" placeholder="Enter new password" required>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            <button type="submit">Change Password</button>
        </form>
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>

    <!-- Floating circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

</body>
</html>
