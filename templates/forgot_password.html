<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    /* Reset */
    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Poppins', sans-serif;
    }

    /* Gradient Animated Background */
    body {
        height:100vh;
        background: linear-gradient(-45deg, #002D72, #0055A4, #FFD100, #002D72);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    /* Reset Password Card */
    .container {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        width: 360px;
        text-align: center;
        animation: slideFade 1s forwards;
        opacity: 0;
        transform: translateY(50px);
    }

    @keyframes slideFade {
        to { transform: translateY(0); opacity:1; }
    }

    .container h2 {
        color: #002D72;
        margin-bottom: 25px;
        font-weight: 700;
    }

    input[type="password"] {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input[type="password"]:focus {
        outline: none;
        border-color: #002D72;
        box-shadow: 0 0 8px rgba(0,45,114,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #002D72;
        color: #FFD100;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(90deg, #FFD100, #FFB700);
        color: #002D72;
    }

    a {
        display: block;
        margin-top: 15px;
        font-size: 14px;
        color: #002D72;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    /* Floating Circles */
    .circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.25;
        animation: float 20s linear infinite;
        z-index: -1;
    }

    .circle1{ width:160px; height:160px; background:#FFD100; top:10%; left:5%; animation-duration:20s;}
    .circle2{ width:110px; height:110px; background:#002D72; top:50%; left:80%; animation-duration:25s;}
    .circle3{ width:130px; height:130px; background:#0055A4; top:70%; left:20%; animation-duration:30s;}
    .circle4{ width:90px; height:90px; background:#FFD100; top:30%; left:50%; animation-duration:18s;}

    @keyframes float{
        0%{ transform: translateY(0) rotate(0deg);}
        50%{ transform: translateY(-50px) rotate(180deg);}
        100%{ transform: translateY(0) rotate(360deg);}
    }

    @media(max-width:400px){
        .container { width:90%; padding:30px; }
    }
</style>

</head>
<body>

    <!-- Reset Password Card -->
    <div class="container">
        <h2>Reset Password</h2>
        <form method="POST">
            <input type="password" name="new_password" placeholder="Enter new password" required>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            <button type="submit">Update Password</button>
        </form>
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>

    <!-- Floating Circles -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>

</body>
</html>
